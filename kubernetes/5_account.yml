apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-deployment
  labels:
    app: account
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
        - name: account
          image: pisethbank/account:v3
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: pisethbank-configmap
                  key: ACCOUNT_APPLICATION_NAME

            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: pisethbank-configmap 
                  key: SPRING_PROFILES_ACTIVE

            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: pisethbank-configmap
                  key: SPRING_CONFIG_IMPORT

            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: pisethbank-configmap
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE

            - name: SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: pisethbank-configmap
                  key: SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS
---
apiVersion: v1
kind: Service
metadata:
  name: account
  namespace: pisethbank
spec:
  selector:
    app: account
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
