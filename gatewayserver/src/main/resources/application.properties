spring.application.name=gatewayserver
#spring.config.import=configserver:http://localhost:8071/
spring.config.import=configserver:http://configserver:8071/

# ====== Actuator Config =========
management.endpoints.web.exposure.include=*

# ======== Metrics =======
management.metrics.tags.application=${spring.application.name}

# ======== Spring Rabbit MQ =======
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ======== configuring info endpoint =========
info.app.name = Gateway Server Microservice
info.app.description = Piseth Bank Gateway Server Application
info.app.version = 1.0.0
management.info.env.enabled = true

#====== Working with Eureka server =============
management.endpoint.gateway.enabled=true

management.health.liveness-state.enabled=true
management.health.readiness-state.enabled=true
management.endpoint.health.probes.enabled=true

#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lowerCaseServiceId=true

#====== log debug =============
logging.level.com.piseth.bank.gatewayserver=DEBUG

#========= Open Telemetry ==============
logging.pattern.level="%5p [${spring.application.name},%X{trace_id},%X{span_id}]"

#========= Keycloak Security ==================
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9080/realms/master/protocol/openid-connect/certs


logging.level.io.netty.resolver.dns=ERROR
